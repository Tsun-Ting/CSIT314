<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Travel Plans</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --accent-blue: #3b82f6;
            --accent-red: #ef4444;
            --accent-green: #10b981;
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --border: #e2e8f0;
            --border-focus: #3b82f6;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
            --radius: 10px;
            --radius-xl: 16px;
            --spacing-xs: 0.5rem;
            --spacing-sm: 0.75rem;
            --spacing-md: 1rem;
            --spacing-lg: 1.5rem;
            --spacing-xl: 2rem;
            --spacing-2xl: 2.5rem;
            --spacing-3xl: 3rem;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            max-width: 1000px;
            margin: 0 auto;
            padding: var(--spacing-3xl) var(--spacing-xl);
            background: linear-gradient(135deg, var(--bg-primary) 0%, #e0f2fe 100%);
            background-attachment: fixed;
            color: var(--text-primary);
            min-height: 100vh;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin: 0 0 var(--spacing-xl) 0;
        }

        h2 {
            font-size: 1.75rem;
            font-weight: 600;
            margin: 0 0 var(--spacing-lg) 0;
        }

        h3 {
            font-size: 1.25rem;
            font-weight: 600;
            margin: 0 0 var(--spacing-sm) 0;
        }

        .nav {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            padding: var(--spacing-lg) var(--spacing-xl);
            margin-bottom: var(--spacing-2xl);
            display: flex;
            flex-wrap: wrap;
            gap: var(--spacing-md);
            align-items: center;
            box-shadow: var(--shadow);
            position: sticky;
            top: var(--spacing-xl);
            z-index: 100;
        }

        .nav a {
            color: var(--text-secondary);
            text-decoration: none;
            padding: var(--spacing-sm) var(--spacing-lg);
            border-radius: var(--radius);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 500;
            position: relative;
            overflow: hidden;
        }

        .nav a::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--accent-blue) 0%, var(--primary) 100%);
            opacity: 0;
            transition: opacity 0.2s ease;
            z-index: -1;
        }

        .nav a:hover {
            color: white;
            transform: translateY(-2px);
        }

        .nav a:hover::before {
            opacity: 1;
        }

        .nav form {
            display: inline;
        }

        .section, .trip-card {
            background: rgba(255, 255, 255, 0.98);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            padding: var(--spacing-2xl);
            margin-bottom: var(--spacing-lg);
            box-shadow: var(--shadow);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .section::before, .trip-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--accent-blue) 0%, var(--accent-green) 100%);
            border-radius: var(--radius-xl) var(--radius-xl) 0 0;
        }

        .section:hover, .trip-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }

        .trip-actions {
            display: flex;
            gap: var(--spacing-md);
            align-items: center;
            flex-wrap: wrap;
            margin-top: var(--spacing-md);
        }

        .trip-actions form {
            margin: 0;
        }

        .delete-button {
            background: var(--accent-red);
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: var(--radius);
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
            box-shadow: var(--shadow-sm);
        }

        .delete-button:hover {
            background: #dc2626;
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        form div {
            margin-bottom: var(--spacing-lg);
        }

        label {
            display: block;
            margin-bottom: var(--spacing-sm);
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-primary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input, select, textarea, button {
            padding: 12px 16px;
            font: inherit;
            width: 100%;
            border: 2px solid var(--border);
            border-radius: var(--radius);
            background: var(--bg-secondary);
            color: var(--text-primary);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 1rem;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--border-focus);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
            transform: translateY(-1px);
        }

        input:hover, select:hover, textarea:hover {
            border-color: var(--accent-blue);
        }

        button[type="submit"] {
            cursor: pointer;
            border: none;
            background: linear-gradient(135deg, var(--accent-blue) 0%, var(--primary-dark) 100%);
            color: white;
            font-weight: 600;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--shadow-sm);
            position: relative;
            overflow: hidden;
        }

        button[type="submit"]:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        button[type="submit"]:active {
            transform: translateY(0);
        }

        .hint {
            color: var(--text-muted);
            font-size: 0.875rem;
            margin-top: var(--spacing-sm);
            font-style: italic;
        }

        ul {
            padding-left: 20px;
            margin: var(--spacing-md) 0;
        }

        li {
            margin-bottom: var(--spacing-sm);
            line-height: 1.6;
        }

        @media (max-width: 760px) {
            body {
                padding: var(--spacing-xl) var(--spacing-lg);
            }

            .nav {
                flex-direction: column;
                position: static;
                align-items: stretch;
                gap: var(--spacing-sm);
                padding: var(--spacing-md);
            }

            .nav a {
                text-align: center;
                padding: var(--spacing-sm);
            }

            .section, .trip-card {
                padding: var(--spacing-lg);
            }
        }
    </style>
</head>
<body>
<h1>Travel Plans</h1>
<div class="nav">
    <a href="/">Home</a>
    <a href="/profile">Profile</a>
    <a href="/shared-itinerary">Share Trips</a>
    <form method="post" action="/logout">
        <button type="submit">Logout</button>
    </form>
</div>

<div class="section">
    <h2>Create a Travel Plan</h2>
    <form action="/trips" method="post">
        <div>
            <label for="tripName">Trip Name</label>
            <input id="tripName" name="tripName" type="text" required>
        </div>
        <div>
            <label for="destinationCountry">Destination</label>
            <select id="destinationCountry" required>
                <option value="">Select destination</option>
                <option value="Japan">Japan</option>
                <option value="Hong Kong">Hong Kong</option>
            </select>
        </div>
        <div>
            <label for="destinationCity">City</label>
            <select id="destinationCity" required>
                <option value="">Select city</option>
            </select>
            <p class="hint">Demo destinations: Japan -> Tokyo or Osaka, Hong Kong -> Hong Kong Island or Kowloon.</p>
        </div>
        <input id="destination" name="destination" type="hidden" required>
        <div>
            <label for="startDate">Start Date</label>
            <input id="startDate" name="startDate" type="date" required>
        </div>
        <div>
            <label for="endDate">End Date</label>
            <input id="endDate" name="endDate" type="date" required>
        </div>
        <div>
            <label for="totalBudget">Travel Budget</label>
            <input id="totalBudget" name="totalBudget" type="number" step="0.01" min="0" required>
        </div>
        <button type="submit">Create Travel Plan</button>
    </form>
</div>

<div class="section">
    <h2>Your Saved Travel Plans</h2>
    <div th:if="${#lists.isEmpty(trips)}">
        <p>No travel plans yet.</p>
    </div>

    <div th:each="trip : ${trips}" class="trip-card">
        <h3 th:text="${trip.tripName}">Trip Name</h3>
        <p>Destination: <span th:text="${trip.destination}">Destination</span></p>
        <div class="trip-actions">
            <a th:href="@{'/trips/' + ${trip.id}}">Open Travel Plan</a>
            <form th:action="@{'/trips/' + ${trip.id} + '/delete'}" method="post">
                <button type="submit" class="delete-button" onclick="return confirm('Delete this travel plan?');">Delete</button>
            </form>
        </div>
    </div>
</div>
<script>
    const countrySelect = document.getElementById("destinationCountry");
    const citySelect = document.getElementById("destinationCity");
    const destinationInput = document.getElementById("destination");
    const startDateInput = document.getElementById("startDate");
    const endDateInput = document.getElementById("endDate");

    const cityOptions = {
        "Japan": ["Tokyo", "Osaka"],
        "Hong Kong": ["Hong Kong Island", "Kowloon"]
    };

    function updateCities() {
        citySelect.innerHTML = '<option value="">Select city</option>';
        const selectedCountry = countrySelect.value;

        (cityOptions[selectedCountry] || []).forEach((city) => {
            const option = document.createElement("option");
            option.value = city;
            option.textContent = city;
            citySelect.appendChild(option);
        });

        destinationInput.value = "";
    }

    function updateDestination() {
        if (countrySelect.value && citySelect.value) {
            destinationInput.value = citySelect.value + ", " + countrySelect.value;
        } else {
            destinationInput.value = "";
        }
    }

    countrySelect.addEventListener("change", () => {
        updateCities();
        updateDestination();
    });

    citySelect.addEventListener("change", updateDestination);

    function syncTripDateRange() {
        if (!startDateInput.value) {
            endDateInput.removeAttribute("min");
            return;
        }

        endDateInput.min = startDateInput.value;
        if (!endDateInput.value || endDateInput.value < startDateInput.value) {
            endDateInput.value = startDateInput.value;
        }
    }

    startDateInput.addEventListener("change", syncTripDateRange);
    syncTripDateRange();
</script>
</body>
</html>
