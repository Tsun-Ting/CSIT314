<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Page Error</title>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 700px;
            margin: 0 auto;
            padding: 40px 24px;
            background: #f7f7f7;
            color: #222;
        }
        .card {
            background: #fff;
            border: 1px solid #dcdcdc;
            border-radius: 8px;
            padding: 20px;
        }
        a {
            margin-right: 12px;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>Something Went Wrong</h1>
    <p th:text="${errorMessage != null ? errorMessage : 'The page could not be loaded.'}">The page could not be loaded.</p>
    <p>
        <a href="/">Home</a>
        <a href="/trips">Trips</a>
        <a href="/shared-itinerary">Shared Itinerary</a>
    </p>
</div>
</body>
</html>
