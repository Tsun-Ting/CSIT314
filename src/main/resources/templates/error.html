<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Page Error</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --accent-red: #ef4444;
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --border: #e2e8f0;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --radius-xl: 16px;
            --spacing-xl: 2rem;
            --spacing-2xl: 2.5rem;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: var(--spacing-2xl) var(--spacing-xl);
            background: linear-gradient(135deg, var(--bg-primary) 0%, #fef3f2 100%);
            background-attachment: fixed;
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: rgba(255, 255, 255, 0.98);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            padding: var(--spacing-2xl);
            box-shadow: var(--shadow);
            text-align: center;
            max-width: 600px;
            width: 100%;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(90deg, var(--accent-red) 0%, #f97316 100%);
            border-radius: var(--radius-xl) var(--radius-xl) 0 0;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin: 0 0 var(--spacing-xl) 0;
            background: linear-gradient(135deg, var(--accent-red) 0%, #f97316 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .card p {
            margin: 0 0 var(--spacing-lg) 0;
            color: var(--text-secondary);
            line-height: 1.7;
        }

        .card p:last-of-type {
            margin-bottom: 0;
        }

        a {
            display: inline-block;
            color: var(--primary);
            text-decoration: none;
            padding: var(--spacing-sm) var(--spacing-lg);
            margin: 0 var(--spacing-xs);
            border-radius: var(--radius);
            transition: all 0.2s ease;
            font-weight: 500;
            border: 2px solid transparent;
        }

        a:hover {
            background: var(--primary);
            color: white;
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        @media (max-width: 768px) {
            body { padding: var(--spacing-xl) var(--spacing-lg); }
            .card { padding: var(--spacing-xl); }
            a { display: block; margin: var(--spacing-sm) 0; }
        }
    </style>
</head>
<body>
<div class="card">
    <h1>Something Went Wrong</h1>
    <p th:text="${errorMessage != null ? errorMessage : 'The page could not be loaded.'}">The page could not be loaded.</p>
    <p>
        <a href="/">Home</a>
        <a href="/trips">Trips</a>
        <a href="/shared-itinerary">Shared Itinerary</a>
    </p>
</div>
</body>
</html>
