<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --accent-blue: #3b82f6;
            --accent-red: #ef4444;
            --accent-green: #10b981;
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --border: #e2e8f0;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
            --radius: 10px;
            --spacing-md: 1rem;
            --spacing-lg: 1.5rem;
            --spacing-xl: 2rem;
            --spacing-2xl: 2.5rem;
            --spacing-3xl: 3rem;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: var(--spacing-3xl) var(--spacing-xl);
            background: linear-gradient(135deg, var(--bg-primary) 0%, #e0f2fe 100%);
            background-attachment: fixed;
            color: var(--text-primary);
            min-height: 100vh;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin: 0 0 var(--spacing-xl) 0;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent-blue) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .card {
            background: rgba(255, 255, 255, 0.98);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: var(--spacing-2xl);
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }

        .card p {
            margin: 0 0 var(--spacing-md) 0;
            color: var(--text-secondary);
            line-height: 1.7;
        }

        form div {
            margin-bottom: var(--spacing-lg);
        }

        label {
            display: block;
            margin-bottom: var(--spacing-sm);
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-primary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input, select, textarea, button {
            padding: 12px 16px;
            font: inherit;
            width: 100%;
            border: 2px solid var(--border);
            border-radius: var(--radius);
            background: var(--bg-secondary);
            color: var(--text-primary);
            transition: all 0.2s ease;
            font-size: 1rem;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        button {
            cursor: pointer;
            border: none;
            background: linear-gradient(135deg, var(--accent-blue) 0%, var(--primary) 100%);
            color: white;
            font-weight: 600;
            padding: 12px 28px;
            margin-top: var(--spacing-md);
            transition: all 0.2s ease;
            box-shadow: var(--shadow);
            width: auto;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .links a {
            color: var(--accent-blue);
            text-decoration: none;
            margin-right: var(--spacing-lg);
            font-weight: 500;
            transition: all 0.2s ease;
            position: relative;
        }

        .links a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-green));
            transition: width 0.3s ease;
        }

        .links a:hover::after {
            width: 100%;
        }

        .error {
            color: var(--accent-red);
            font-weight: 500;
            margin-bottom: var(--spacing-md);
            padding: var(--spacing-sm) var(--spacing-md);
            background: rgba(239, 68, 68, 0.1);
            border-left: 3px solid var(--accent-red);
            border-radius: 6px;
        }

        @media (max-width: 768px) {
            body { padding: var(--spacing-xl) var(--spacing-lg); }
            .card { padding: var(--spacing-lg); }
        }
    </style>
</head>
<body>
<div class="card">
    <h1>Register</h1>
    <p class="links"><a href="/">Home</a> <a href="/login">Login</a></p>
    <p class="error" th:if="${errorMessage}" th:text="${errorMessage}">Error message</p>
    <form method="post" action="/register">
        <div>
            <label for="name">Name</label>
            <input id="name" name="name" type="text" required>
        </div>
        <div>
            <label for="email">Email</label>
            <input id="email" name="email" type="email" required>
        </div>
        <div>
            <label for="password">Password</label>
            <input id="password" name="password" type="password" required>
        </div>
        <div>
            <label for="personalInfo">Personal Info</label>
            <input id="personalInfo" name="personalInfo" type="text">
        </div>
        <div>
            <label for="travelPreferences">Travel Preferences</label>
            <input id="travelPreferences" name="travelPreferences" type="text">
        </div>
        <div>
            <label for="budgetRange">Budget Range</label>
            <input id="budgetRange" name="budgetRange" type="number" step="0.01" min="0" value="0">
        </div>
        <div>
            <label for="interests">Interests</label>
            <input id="interests" name="interests" type="text">
        </div>
        <button type="submit">Create Account</button>
    </form>
</div>
</body>
</html>
