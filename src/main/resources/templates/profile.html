<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>User Profile</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --accent-blue: #3b82f6;
            --accent-red: #ef4444;
            --accent-green: #10b981;
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --border: #e2e8f0;
            --border-focus: #3b82f6;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
            --radius: 10px;
            --radius-xl: 16px;
            --spacing-xs: 0.5rem;
            --spacing-sm: 0.75rem;
            --spacing-md: 1rem;
            --spacing-lg: 1.5rem;
            --spacing-xl: 2rem;
            --spacing-2xl: 2.5rem;
            --spacing-3xl: 3rem;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 1000px;
            margin: 0 auto;
            padding: var(--spacing-3xl) var(--spacing-xl);
            background: linear-gradient(135deg, var(--bg-primary) 0%, #e0f2fe 100%);
            background-attachment: fixed;
            color: var(--text-primary);
            min-height: 100vh;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin: 0 0 var(--spacing-xl) 0;
            color: #000;
        }

        .nav {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            padding: var(--spacing-lg) var(--spacing-xl);
            margin-bottom: var(--spacing-2xl);
            display: flex;
            flex-wrap: wrap;
            gap: var(--spacing-md);
            align-items: center;
            box-shadow: var(--shadow);
            position: sticky;
            top: var(--spacing-xl);
            z-index: 100;
        }

        .nav a {
            color: var(--text-secondary);
            text-decoration: none;
            padding: var(--spacing-sm) var(--spacing-lg);
            border-radius: var(--radius);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 500;
            position: relative;
            overflow: hidden;
        }

        .nav a::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--accent-blue) 0%, var(--primary) 100%);
            opacity: 0;
            transition: opacity 0.2s ease;
            z-index: -1;
        }

        .nav a:hover {
            color: white;
            transform: translateY(-2px);
        }

        .nav a:hover::before {
            opacity: 1;
        }

        .nav form {
            display: inline;
        }

        .card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            padding: var(--spacing-2xl);
            box-shadow: var(--shadow);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--accent-blue) 0%, var(--accent-green) 100%);
            border-radius: var(--radius-xl) var(--radius-xl) 0 0;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }

        .card p {
            margin: 0 0 var(--spacing-md) 0;
            color: var(--text-secondary);
            line-height: 1.7;
        }

        .card p:last-of-type {
            margin-bottom: 0;
        }

        form div {
            margin-bottom: var(--spacing-lg);
        }

        label {
            display: block;
            margin-bottom: var(--spacing-sm);
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-primary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input, select, textarea, button {
            padding: 12px 16px;
            font: inherit;
            width: 100%;
            border: 2px solid var(--border);
            border-radius: var(--radius);
            background: var(--bg-secondary);
            color: var(--text-primary);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 1rem;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--border-focus);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
            transform: translateY(-1px);
        }

        input:hover, select:hover, textarea:hover {
            border-color: var(--accent-blue);
        }

        button {
            cursor: pointer;
            border: none;
            background: linear-gradient(135deg, var(--accent-blue) 0%, var(--primary-dark) 100%);
            color: white;
            font-weight: 600;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--shadow-sm);
            position: relative;
            overflow: hidden;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        button:active {
            transform: translateY(0);
        }

        @media (max-width: 760px) {
            body {
                padding: var(--spacing-xl) var(--spacing-md);
            }

            .nav {
                flex-direction: column;
                align-items: stretch;
                padding: var(--spacing-md);
            }

            .nav a {
                text-align: center;
                padding: var(--spacing-sm);
            }

            .card {
                padding: var(--spacing-lg);
            }
        }
    </style>
</head>
<body>
<h1>User Profile</h1>
<div class="nav">
    <a href="/">Home</a>
    <a href="/trips">Travel Plans</a>
    <a href="/shared-itinerary">Share Trips</a>
    <form method="post" action="/logout" style="display:inline;">
        <button type="submit">Logout</button>
    </form>
</div>

<div class="card">
    <p><strong>Email:</strong> <span th:text="${profileUser.email}">email</span></p>
    <p>Use this page to update the travel preferences that support your planning and recommendations.</p>
    <form method="post" action="/profile">
        <div>
            <label for="name">Name</label>
            <input id="name" name="name" type="text" th:value="${profileUser.name}" required>
        </div>
        <div>
            <label for="personalInfo">Personal Info</label>
            <input id="personalInfo" name="personalInfo" type="text" th:value="${profileUser.personalInfo}">
        </div>
        <div>
            <label for="travelPreferences">Travel Preferences</label>
            <input id="travelPreferences" name="travelPreferences" type="text" th:value="${profileUser.travelPreferences}">
        </div>
        <div>
            <label for="budgetRange">Budget Range</label>
            <input id="budgetRange" name="budgetRange" type="number" step="0.01" min="0" th:value="${profileUser.budgetRange != null ? profileUser.budgetRange : 0}">
        </div>
        <div>
            <label for="interests">Interests</label>
            <input id="interests" name="interests" type="text" th:value="${profileUser.interests}">
        </div>
        <button type="submit">Save Profile</button>
    </form>
</div>
</body>
</html>
